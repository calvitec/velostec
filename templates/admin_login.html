<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login · TechVerse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { 
            background: #0a0a1a; 
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .glass-card { 
            background: rgba(255,255,255,0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.06); 
            border-radius: 24px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
        }
        
        .form-input {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px 16px;
            width: 100%;
            color: white;
            transition: all 0.3s;
        }
        .form-input::placeholder { color: rgba(255,255,255,0.3); }
        .form-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        
        .btn-primary { 
            background: linear-gradient(135deg, #2563eb, #06b6d4); 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: none; 
            cursor: pointer; 
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            width: 100%;
        }
        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 40px rgba(37,99,235,0.3); 
        }
        
        .form-label {
            color: rgba(255,255,255,0.5);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 6px;
        }
        
        .hero-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.06;
            pointer-events: none;
        }
        .hero-blob.blue {
            width: 400px;
            height: 400px;
            background: #2563eb;
            top: -100px;
            right: -100px;
        }
        .hero-blob.cyan {
            width: 300px;
            height: 300px;
            background: #06b6d4;
            bottom: -80px;
            left: -80px;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .alert-danger {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #fca5a5;
        }
        .alert-success {
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.2);
            color: #6ee7b7;
        }
    </style>
</head>
<body>
    <div class="hero-blob blue"></div>
    <div class="hero-blob cyan"></div>

    <div class="glass-card">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center text-white font-bold text-2xl shadow-lg shadow-blue-500/20">TV</div>
            <h2 class="text-2xl font-bold text-white mt-4">Tech<span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">Verse</span></h2>
            <p class="text-gray-500 text-sm mt-1">Admin Panel</p>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        <i class="fas fa-{% if category == 'danger' %}exclamation-circle{% else %}check-circle{% endif %} mr-2"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Login Form -->
        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="mb-4">
                <label class="form-label"><i class="fas fa-user mr-2"></i> Username</label>
                <input type="text" name="username" class="form-input" placeholder="Enter username" required autofocus />
            </div>
            <div class="mb-6">
                <label class="form-label"><i class="fas fa-lock mr-2"></i> Password</label>
                <input type="password" name="password" class="form-input" placeholder="Enter password" required />
            </div>
            <button type="submit" class="btn-primary">
                <i class="fas fa-sign-in-alt mr-2"></i> Login
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-gray-500 text-xs">Default: admin / electronics2026</p>
            <a href="/" class="text-gray-600 text-sm hover:text-white transition mt-3 inline-block">
                <i class="fas fa-arrow-left mr-1"></i> Back to Shop
            </a>
        </div>
    </div>

    <script>
        // Auto-hide flash messages after 5 seconds
        document.addEventListener('DOMContentLoaded', function() {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                setTimeout(() => {
                    alert.style.transition = 'opacity 0.5s';
                    alert.style.opacity = '0';
                    setTimeout(() => alert.remove(), 500);
                }, 5000);
            });
        });
    </script>
</body>
</html>
